<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="780" font-family="Arial, sans-serif">

  <!-- White background -->
  <rect width="1000" height="780" fill="white"/>

  <!-- System boundary -->
  <rect x="165" y="35" width="680" height="560" fill="none" stroke="#333" stroke-width="2.5"/>
  <text x="505" y="60" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Project Management System</text>

  <!-- DEVELOPER stick figure (left) -->
  <circle cx="80" cy="100" r="15" fill="none" stroke="#333" stroke-width="1.8"/>
  <line x1="80" y1="115" x2="80" y2="150" stroke="#333" stroke-width="1.8"/>
  <line x1="55" y1="130" x2="105" y2="130" stroke="#333" stroke-width="1.8"/>
  <line x1="80" y1="150" x2="60" y2="175" stroke="#333" stroke-width="1.8"/>
  <line x1="80" y1="150" x2="100" y2="175" stroke="#333" stroke-width="1.8"/>
  <text x="80" y="194" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Developer</text>

  <!-- PROJECT LEADER stick figure (right) -->
  <circle cx="920" cy="100" r="15" fill="none" stroke="#333" stroke-width="1.8"/>
  <line x1="920" y1="115" x2="920" y2="150" stroke="#333" stroke-width="1.8"/>
  <line x1="895" y1="130" x2="945" y2="130" stroke="#333" stroke-width="1.8"/>
  <line x1="920" y1="150" x2="900" y2="175" stroke="#333" stroke-width="1.8"/>
  <line x1="920" y1="150" x2="940" y2="175" stroke="#333" stroke-width="1.8"/>
  <text x="920" y="194" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Project</text>
  <text x="920" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Leader</text>

  <!-- Generalization: Project Leader extends Developer -->
  <!-- Route: below both actors and system box -->
  <polyline points="80,218 22,218 22,715 978,715 978,218 920,218"
            fill="none" stroke="#555" stroke-width="1.6" stroke-dasharray="none"/>
  <!-- Hollow triangle arrowhead at Developer end (tip points right, toward Developer) -->
  <polygon points="80,218 63,209 63,227" fill="white" stroke="#555" stroke-width="1.6"/>
  <text x="500" y="735" text-anchor="middle" font-size="11" fill="#555" font-style="italic">«extends» — Project Leader is a specialization of Developer</text>

  <!-- ============================================================ -->
  <!-- BLUE USE CASES — Developer only                              -->
  <!-- ============================================================ -->

  <!-- 1: Create Project -->
  <ellipse cx="305" cy="95" rx="110" ry="24" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="305" y="100" text-anchor="middle" font-size="12">Create Project</text>

  <!-- 2: Register Time on Activity -->
  <ellipse cx="305" cy="170" rx="125" ry="24" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="305" y="165" text-anchor="middle" font-size="11">Register Time</text>
  <text x="305" y="179" text-anchor="middle" font-size="11">on Activity</text>

  <!-- 3: Register Absence -->
  <ellipse cx="305" cy="248" rx="115" ry="24" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="305" y="253" text-anchor="middle" font-size="12">Register Absence</text>

  <!-- 4: View Available Developers -->
  <ellipse cx="305" cy="325" rx="125" ry="24" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="305" y="320" text-anchor="middle" font-size="11">View Available</text>
  <text x="305" y="334" text-anchor="middle" font-size="11">Developers</text>

  <!-- ============================================================ -->
  <!-- GREEN USE CASES — Developer + Project Leader                 -->
  <!-- ============================================================ -->

  <!-- 5: Create Activity -->
  <ellipse cx="505" cy="435" rx="115" ry="24" fill="#dcfce7" stroke="#16a34a" stroke-width="1.8"/>
  <text x="505" y="440" text-anchor="middle" font-size="12">Create Activity</text>

  <!-- 6: Add Developer to Activity -->
  <ellipse cx="505" cy="518" rx="125" ry="24" fill="#dcfce7" stroke="#16a34a" stroke-width="1.8"/>
  <text x="505" y="513" text-anchor="middle" font-size="11">Add Developer</text>
  <text x="505" y="527" text-anchor="middle" font-size="11">to Activity</text>

  <!-- ============================================================ -->
  <!-- ORANGE USE CASES — Project Leader only                       -->
  <!-- ============================================================ -->

  <!-- 7: Assign Project Leader -->
  <ellipse cx="703" cy="95" rx="125" ry="24" fill="#ffedd5" stroke="#ea580c" stroke-width="1.8"/>
  <text x="703" y="90" text-anchor="middle" font-size="11">Assign Project</text>
  <text x="703" y="104" text-anchor="middle" font-size="11">Leader</text>

  <!-- 8: Set Project Deadline -->
  <ellipse cx="703" cy="170" rx="120" ry="24" fill="#ffedd5" stroke="#ea580c" stroke-width="1.8"/>
  <text x="703" y="165" text-anchor="middle" font-size="11">Set Project</text>
  <text x="703" y="179" text-anchor="middle" font-size="11">Deadline</text>

  <!-- 9: View Project Progress -->
  <ellipse cx="703" cy="248" rx="120" ry="24" fill="#ffedd5" stroke="#ea580c" stroke-width="1.8"/>
  <text x="703" y="243" text-anchor="middle" font-size="11">View Project</text>
  <text x="703" y="257" text-anchor="middle" font-size="11">Progress</text>

  <!-- 10: Generate Project Report -->
  <ellipse cx="703" cy="325" rx="125" ry="24" fill="#ffedd5" stroke="#ea580c" stroke-width="1.8"/>
  <text x="703" y="320" text-anchor="middle" font-size="11">Generate Project</text>
  <text x="703" y="334" text-anchor="middle" font-size="11">Report</text>

  <!-- ============================================================ -->
  <!-- CONNECTION LINES                                             -->
  <!-- ============================================================ -->

  <!-- Developer → Blue use cases -->
  <line x1="95" y1="118" x2="195" y2="95"  stroke="#3b82f6" stroke-width="1.1"/>
  <line x1="95" y1="124" x2="180" y2="170" stroke="#3b82f6" stroke-width="1.1"/>
  <line x1="95" y1="130" x2="190" y2="248" stroke="#3b82f6" stroke-width="1.1"/>
  <line x1="95" y1="136" x2="180" y2="325" stroke="#3b82f6" stroke-width="1.1"/>

  <!-- Developer → Green use cases -->
  <line x1="95" y1="142" x2="390" y2="435" stroke="#16a34a" stroke-width="1.1"/>
  <line x1="95" y1="146" x2="380" y2="518" stroke="#16a34a" stroke-width="1.1"/>

  <!-- Project Leader → Orange use cases -->
  <line x1="905" y1="118" x2="828" y2="95"  stroke="#ea580c" stroke-width="1.1"/>
  <line x1="905" y1="124" x2="823" y2="170" stroke="#ea580c" stroke-width="1.1"/>
  <line x1="905" y1="130" x2="823" y2="248" stroke="#ea580c" stroke-width="1.1"/>
  <line x1="905" y1="136" x2="828" y2="325" stroke="#ea580c" stroke-width="1.1"/>

  <!-- Project Leader → Green use cases -->
  <line x1="905" y1="142" x2="620" y2="435" stroke="#16a34a" stroke-width="1.1"/>
  <line x1="905" y1="146" x2="630" y2="518" stroke="#16a34a" stroke-width="1.1"/>

  <!-- ============================================================ -->
  <!-- LEGEND                                                       -->
  <!-- ============================================================ -->
  <rect x="178" y="600" width="654" height="42" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <ellipse cx="245" cy="621" rx="36" ry="13" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="290" y="625" font-size="11" fill="#333">Developer only</text>

  <ellipse cx="445" cy="621" rx="36" ry="13" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <text x="490" y="625" font-size="11" fill="#333">Project Leader only</text>

  <ellipse cx="670" cy="621" rx="36" ry="13" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="715" y="625" font-size="11" fill="#333">Developer + Project Leader</text>

</svg>
